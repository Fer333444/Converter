<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Control - Convertia GO</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
    <style>
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 30px;
            transform: translateZ(30px);
        }
        .stat-card {
            background: #090a0f;
            border: 1px solid rgba(0, 162, 255, 0.3);
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            box-shadow: inset 0 0 20px rgba(0, 162, 255, 0.05);
            transition: transform 0.3s;
        }
        .stat-card:hover {
            transform: translateY(-5px);
            border-color: #00ff88;
        }
        .stat-number {
            font-size: 40px;
            font-weight: 900;
            color: white;
            margin: 10px 0;
            text-shadow: 0 0 15px rgba(255,255,255,0.3);
        }
        .stat-title {
            color: #00a2ff;
            font-size: 14px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .stat-title.green { color: #00ff88; }
        
        /* Nuevo indicador de "En Vivo" que palpita */
        .live-indicator {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-top: 35px;
            padding: 8px 18px;
            background: rgba(255, 50, 50, 0.1);
            border: 1px solid rgba(255, 50, 50, 0.4);
            color: #ff4d4d;
            border-radius: 20px;
            font-size: 13px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 0 15px rgba(255, 50, 50, 0.2);
            animation: pulse-red 2s infinite;
        }
        .dot {
            width: 8px;
            height: 8px;
            background-color: #ff4d4d;
            border-radius: 50%;
        }
        @keyframes pulse-red {
            0% { box-shadow: 0 0 0 0 rgba(255, 50, 50, 0.4); }
            70% { box-shadow: 0 0 0 10px rgba(255, 50, 50, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 50, 50, 0); }
        }
    </style>
</head>
<body>

    <div class="stars-container" id="stars-bg"></div>
    <div class="ambient-glow"><div class="glow-1"></div><div class="glow-2"></div></div>

    <div class="glass-panel" style="max-width: 800px; margin-top: 50px;">
        <h1>👑 Panel de Control</h1>
        <p class="subtitle">Estadísticas en tiempo real de Convertia GO</p>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-title green">🌍 Links Descargados</div>
                <div class="stat-number" id="stat-links">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-title">🤖 Transcripciones IA</div>
                <div class="stat-number" id="stat-txt">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-title">🎬 Convertidos MP4</div>
                <div class="stat-number" id="stat-mp4">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-title">🎵 Audios Extraídos</div>
                <div class="stat-number" id="stat-audio">0</div>
            </div>
        </div>

        <div class="live-indicator">
            <div class="dot"></div> Actualización Automática
        </div>
        
        <br><br><br>
        <a href="/" style="color: #888; font-size: 14px; text-decoration: none; transition: color 0.3s;" onmouseover="this.style.color='#fff'" onmouseout="this.style.color='#888'">← Volver a la App</a>
    </div>

    <script>
        async function loadStats() {
            try {
                const res = await fetch('/api/stats');
                const data = await res.json();
                
                // Actualizar los números en pantalla
                document.getElementById('stat-links').innerText = data.total_links_descargados;
                document.getElementById('stat-txt').innerText = data.herramientas_locales.txt;
                document.getElementById('stat-mp4').innerText = data.herramientas_locales.mp4;
                // Sumar mp3 y wav para tener el total de audios
                document.getElementById('stat-audio').innerText = data.herramientas_locales.mp3 + data.herramientas_locales.wav;
            } catch (e) {
                console.error("Fallo al cargar las estadísticas", e);
            }
        }

        // 1. Cargar los datos inmediatamente al entrar a la página
        loadStats();

        // 2. MAGIA: Programar un temporizador que ejecute loadStats() cada 3 segundos (3000 milisegundos)
        setInterval(loadStats, 3000);
    </script>
</body>
</html>
